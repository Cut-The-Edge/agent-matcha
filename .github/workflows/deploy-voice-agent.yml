name: Deploy Voice Agent to LiveKit Cloud

on:
  push:
    branches: [main]
    paths:
      - "voice-agent/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: voice-agent-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Install LiveKit CLI
        run: |
          curl -sSL https://get.livekit.io/cli | bash
          echo "$HOME/.livekit" >> "$GITHUB_PATH"

      - name: Write secrets file
        run: |
          printf '%s\n' \
            "GOOGLE_API_KEY=${SECRET_GOOGLE}" \
            "DEEPGRAM_API_KEY=${SECRET_DEEPGRAM}" \
            "CARTESIA_API_KEY=${SECRET_CARTESIA}" \
            "CONVEX_URL=${SECRET_CONVEX}" \
            "TWILIO_ACCOUNT_SID=${SECRET_TWILIO_SID}" \
            "TWILIO_AUTH_TOKEN=${SECRET_TWILIO_TOKEN}" \
            "TWILIO_SIP_TRUNK_SID=${SECRET_TWILIO_TRUNK}" \
            "TWILIO_PHONE_NUMBER=${SECRET_TWILIO_PHONE}" \
            > /tmp/agent-secrets.env
        env:
          SECRET_GOOGLE: ${{ secrets.GOOGLE_API_KEY }}
          SECRET_DEEPGRAM: ${{ secrets.DEEPGRAM_API_KEY }}
          SECRET_CARTESIA: ${{ secrets.CARTESIA_API_KEY }}
          SECRET_CONVEX: ${{ secrets.CONVEX_SITE_URL }}
          SECRET_TWILIO_SID: ${{ secrets.TWILIO_ACCOUNT_SID_SECRET }}
          SECRET_TWILIO_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN_SECRET }}
          SECRET_TWILIO_TRUNK: ${{ secrets.TWILIO_SIP_TRUNK_SID_SECRET }}
          SECRET_TWILIO_PHONE: ${{ secrets.TWILIO_PHONE_NUMBER_SECRET }}

      - name: Deploy to LiveKit Cloud
        run: |
          cd voice-agent
          lk agent deploy \
            --secrets-file /tmp/agent-secrets.env \
            --region us-east \
            --yes
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}

      - name: Cleanup secrets file
        if: always()
        run: rm -f /tmp/agent-secrets.env

      - name: Verify deployment
        run: |
          cd voice-agent
          timeout 300 bash -c 'while true; do
            STATUS=$(lk agent status 2>&1 | grep -o "Running\|Error\|Starting")
            if [ "$STATUS" = "Running" ]; then
              echo "Agent is running!"
              exit 0
            elif [ "$STATUS" = "Error" ]; then
              echo "Agent is in error state!"
              exit 1
            fi
            echo "Waiting for agent... (status: $STATUS)"
            sleep 10
          done'
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
